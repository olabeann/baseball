<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>승승야구 — 야구 팬 서비스 MVP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue-700:#0B4FD0; --blue-600:#155FE6; --blue-500:#1E6BF2; --blue-400:#3D87FF; --blue-100:#DCEAFF;
  --sky:#EEF4FF; --navy:#13295A; --muted:#7D8FB5; --line:#DEE8FB;
  --red:#E2483D; --red-soft:#FDECEA;
  --win:#1E6BF2; --lose:#9AA8C6; --void:#F0A03C; --live:#E2483D;
  --r-lg:22px; --r-md:16px; --r-sm:12px;
  --shadow:0 10px 30px rgba(19,41,90,.10);
  --display:'Jua', 'Noto Sans KR', sans-serif;
  --body:'Noto Sans KR', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--body); color:var(--navy); background:linear-gradient(170deg,#2E7CFF 0%,#0B4FD0 100%);
  display:flex; justify-content:center;
}
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; opacity:.25;
  background-image:radial-gradient(circle at 2px 2px, rgba(255,255,255,.5) 2px, transparent 2.5px);
  background-size:34px 34px;
}
#app{
  position:relative; width:100%; max-width:430px; min-height:100dvh; background:var(--sky);
  display:flex; flex-direction:column; overflow:hidden;
  padding-top:env(safe-area-inset-top);
}
@media(min-width:480px){
  body{padding:28px 0}
  #app{min-height:calc(100dvh - 56px); max-height:932px; border-radius:38px; box-shadow:0 30px 80px rgba(4,24,68,.45); border:6px solid #082B66}
}
/* ---------- shared ---------- */
.screen{display:none; flex:1; flex-direction:column; overflow-y:auto; padding-bottom:calc(110px + env(safe-area-inset-bottom)); scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}
.screen.active{display:flex}
.appbar{
  position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:10px;
  padding:18px 20px 12px; background:linear-gradient(var(--sky) 75%, rgba(238,244,255,0));
}
.appbar h1{font-family:var(--display); font-size:22px; font-weight:400; letter-spacing:.5px}
.appbar .spacer{flex:1}
.back-btn{
  width:36px; height:36px; border-radius:50%; border:none; background:#fff; box-shadow:var(--shadow);
  display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--navy); flex:none;
}
.back-btn svg{width:18px;height:18px}
.section{padding:6px 20px 0}
.section-title{
  display:flex; align-items:baseline; gap:8px; margin:18px 0 10px;
  font-family:var(--display); font-size:17px; letter-spacing:.3px;
}
.section-title small{font-family:var(--body); font-size:12px; color:var(--muted); font-weight:500}
.stitch{
  height:9px; margin:22px 20px 2px; border-radius:9px; opacity:.85;
  background-image:repeating-linear-gradient(115deg, transparent 0 7px, var(--red) 7px 10px, transparent 10px 16px);
}
.card{background:#fff; border-radius:var(--r-lg); box-shadow:var(--shadow); padding:16px}
.pill{
  display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:700; letter-spacing:.4px;
  padding:4px 10px; border-radius:999px; background:var(--blue-100); color:var(--blue-600);
}
.pill.live{background:var(--red-soft); color:var(--live)}
.pill.live::before{content:""; width:6px;height:6px;border-radius:50%;background:var(--live); animation:blink 1.2s infinite}
.pill.end{background:#E9EDF6; color:#5A6A92}
.pill.cancel{background:#FFF3E0; color:#C57A12}
.pill.hit{background:#E3EDFF; color:var(--win)}
.pill.miss{background:#EEF1F7; color:var(--lose)}
.pill.void{background:#FFF3E0; color:var(--void)}
@keyframes blink{50%{opacity:.25}}
.btn{
  display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
  border:none; border-radius:var(--r-md); padding:15px; cursor:pointer;
  font-family:var(--display); font-size:16px; letter-spacing:.5px; color:#fff;
  background:linear-gradient(135deg,var(--blue-400),var(--blue-600));
  box-shadow:0 8px 20px rgba(30,107,242,.35); transition:transform .12s;
}
.btn:active{transform:scale(.97)}
.btn.ghost{background:#fff; color:var(--blue-600); box-shadow:var(--shadow); border:1.5px solid var(--blue-100)}
.btn.red{background:linear-gradient(135deg,#F0655B,var(--red)); box-shadow:0 8px 20px rgba(226,72,61,.3)}
.btn:disabled{background:#C7D2E8; box-shadow:none; cursor:default}
.team-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#EAEDF2;overflow:hidden;flex:none;box-shadow:0 1px 4px rgba(19,41,90,.12)}
.team-dot img{width:100%;height:100%;object-fit:cover;display:block}
/* ---------- GNB ---------- */
#gnb{
  position:absolute; left:16px; right:16px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:50;
  display:flex; background:#fff; border-radius:24px; box-shadow:0 14px 36px rgba(8,43,102,.22);
  padding:8px;
}
#gnb button{
  flex:1; border:none; background:none; cursor:pointer; padding:9px 0 7px; border-radius:18px;
  display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted);
  font-family:var(--display); font-size:11px; letter-spacing:.5px; transition:all .15s;
}
#gnb button svg{width:22px;height:22px}
#gnb button.on{color:#fff; background:linear-gradient(135deg,var(--blue-400),var(--blue-600)); box-shadow:0 6px 14px rgba(30,107,242,.35)}
/* ---------- login ---------- */
#scr-login{position:relative; justify-content:space-between; padding-bottom:0}
.login-body{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 28px}
.login-body img{width:158px; animation:bounce 2.6s ease-in-out infinite; filter:drop-shadow(0 14px 22px rgba(19,41,90,.18))}
.login-body h1{font-family:var(--display); font-size:38px; font-weight:400; letter-spacing:1px; color:var(--blue-600); margin-top:28px}
.login-body p{margin-top:10px; font-size:15px; font-weight:500; color:#5A6A92}
.login-cta{display:flex; flex-direction:column; gap:10px; padding:0 20px calc(26px + env(safe-area-inset-bottom))}
.btn.kakao{background:#FEE500; color:#191600; box-shadow:0 8px 20px rgba(222,196,0,.35)}
.btn.apple{background:#13295A; color:#fff; box-shadow:0 8px 20px rgba(19,41,90,.3)}
.confetti{position:absolute; width:24px; height:9px; border-radius:6px; opacity:.9; pointer-events:none}
/* ---------- onboarding ---------- */
#scr-onboard{background:linear-gradient(175deg,#3D87FF,#0B4FD0); padding-bottom:30px}
#scr-onboard .hero{display:flex; flex-direction:column; align-items:center; padding:48px 24px 8px; color:#fff; text-align:center}
#scr-onboard .hero img{width:196px; height:auto; filter:drop-shadow(0 18px 26px rgba(4,24,68,.4)); animation:bounce 2.6s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
#scr-onboard .hero h1{font-family:var(--display); font-size:26px; font-weight:400; margin-top:20px; line-height:1.35}
#scr-onboard .hero p{margin-top:8px; font-size:13.5px; opacity:.85; line-height:1.6}
.team-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:20px 20px 6px}
.team-opt{
  display:flex; align-items:center; gap:10px; background:#fff; border:2.5px solid transparent;
  border-radius:var(--r-md); padding:12px; cursor:pointer; font-weight:700; font-size:14px; color:var(--navy);
  transition:all .12s;
}
.team-opt.sel{border-color:#FFD34D; box-shadow:0 0 0 4px rgba(255,211,77,.35); transform:scale(1.02)}
.team-opt.none{grid-column:1/-1; justify-content:center; background:rgba(255,255,255,.16); color:#fff; border-color:rgba(255,255,255,.45); border-style:dashed}
.team-opt.none.sel{background:rgba(255,255,255,.3)}
#scr-onboard .cta{padding:14px 20px 0}
#scr-onboard .cta .btn{background:#fff; color:var(--blue-600); box-shadow:0 10px 24px rgba(4,24,68,.3)}
/* ---------- home ---------- */
.home-hero{
  margin:4px 20px 0; border-radius:26px; padding:18px; color:#fff;
  background:linear-gradient(135deg,var(--blue-400),var(--blue-700)); box-shadow:0 14px 32px rgba(11,79,208,.35);
  display:flex; align-items:center; gap:14px;
}
.home-hero img{width:72px;height:auto;flex:none; filter:drop-shadow(0 8px 14px rgba(4,24,68,.35))}
.home-hero h2{font-family:var(--display); font-size:19px; font-weight:400; line-height:1.4}
.home-hero p{font-size:12.5px; opacity:.85; margin-top:3px}
.game-card{display:flex; flex-direction:column; gap:12px; margin-bottom:12px; cursor:pointer; transition:transform .12s}
.game-card:active{transform:scale(.98)}
.game-card .top{display:flex; align-items:center; justify-content:space-between; font-size:12px; color:var(--muted); font-weight:500}
.game-card .teams{display:flex; align-items:center; justify-content:space-between}
.game-card .t{display:flex; flex-direction:column; align-items:center; gap:6px; width:86px}
.game-card .t span{font-size:13px; font-weight:700}
.game-card .mid{text-align:center; font-family:var(--display)}
.game-card .mid .score{font-size:26px; letter-spacing:2px}
.game-card .mid .vs{font-size:18px; color:var(--muted)}
.game-card .mid .sub{font-size:11px; color:var(--muted); font-family:var(--body); font-weight:500; margin-top:2px}
.mini-list .card{display:flex; align-items:center; gap:12px; margin-bottom:10px; cursor:pointer}
.mini-list .card:active{transform:scale(.98)}
.mini-list .info{flex:1; min-width:0}
.mini-list .info b{font-size:14px}
.mini-list .info p{font-size:12px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.chev{color:#C3CFE6; flex:none}
/* ---------- games list ---------- */
.date-tabs{display:flex; gap:8px; padding:4px 20px 2px}
.games-soon{margin:6px 20px 0; padding:14px 16px; border-radius:var(--r-md); background:#EAF1FF; border:1.5px dashed #BCD2FA; color:#2A55A8; font-size:12.5px; line-height:1.6; text-align:center; font-weight:500}
.date-tabs button{
  flex:1; border:none; background:#fff; border-radius:14px; padding:10px 0; cursor:pointer;
  font-family:var(--display); font-size:13px; color:var(--muted); box-shadow:var(--shadow);
}
.date-tabs button.on{background:linear-gradient(135deg,var(--blue-400),var(--blue-600)); color:#fff}
.empty{
  display:flex; flex-direction:column; align-items:center; gap:12px; padding:46px 20px; text-align:center; color:var(--muted); font-size:13.5px;
}
.empty img{width:96px;height:auto;opacity:.95; filter:drop-shadow(0 8px 14px rgba(19,41,90,.15))}
/* ---------- game detail ---------- */
.detail-hero{margin:4px 20px 0; border-radius:26px; overflow:hidden; box-shadow:var(--shadow); background:#fff}
.detail-hero .bg{background:linear-gradient(135deg,var(--blue-400),var(--blue-700)); color:#fff; padding:20px 18px 18px; position:relative}
.detail-hero .bg .seam{position:absolute; left:-30px; bottom:-44px; width:130px; height:130px; border-radius:50%; border:3px dashed rgba(255,255,255,.3)}
.detail-hero .meta{display:flex; justify-content:center; gap:8px; margin-bottom:14px; font-size:12px; opacity:.9}
.detail-hero .teams{display:flex; align-items:center; justify-content:space-around}
.detail-hero .t{display:flex; flex-direction:column; align-items:center; gap:7px; width:96px}
.detail-hero .t .team-dot{width:46px;height:46px; border:2.5px solid rgba(255,255,255,.85)}
.detail-hero .t span{font-size:13.5px; font-weight:700}
.detail-hero .score{font-family:var(--display); font-size:38px; letter-spacing:3px}
.detail-hero .vs{font-family:var(--display); font-size:24px; opacity:.85}
.detail-hero .statusline{text-align:center; margin-top:10px}
.detail-hero .foot{display:flex; justify-content:space-around; padding:12px; font-size:12px; color:var(--muted); font-weight:500}
.action-stack{display:flex; flex-direction:column; gap:10px; padding:16px 20px 0}
.notice{
  margin:16px 20px 0; padding:14px 16px; border-radius:var(--r-md); font-size:13px; line-height:1.6;
  background:#FFF7E8; color:#9A6A14; border:1.5px dashed #F0CE8C;
}
.notice.blue{background:#EAF1FF; color:#2A55A8; border-color:#BCD2FA}
/* ---------- predict ---------- */
.pick-wrap{display:flex; gap:12px; padding:18px 20px 0}
.pick{
  flex:1; background:#fff; border:3px solid transparent; border-radius:24px; padding:22px 10px 18px;
  display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer; box-shadow:var(--shadow); transition:all .15s;
}
.pick .team-dot{width:58px; height:58px}
.pick b{font-size:15px}
.pick small{font-size:11.5px; color:var(--muted); font-weight:500}
.pick.sel{border-color:var(--red); transform:translateY(-4px); box-shadow:0 16px 32px rgba(226,72,61,.22)}
.pick.sel::after{content:"내 픽!"; font-family:var(--display); font-size:11px; color:#fff; background:var(--red); padding:3px 10px; border-radius:999px}
.vs-badge{
  align-self:center; margin:0 -4px; z-index:2; width:44px; height:44px; border-radius:50%; background:#fff;
  display:flex; align-items:center; justify-content:center; font-family:var(--display); color:var(--red);
  box-shadow:var(--shadow); border:2px dashed var(--red); flex:none; position:relative; top:46px;
}
/* done */
.done-wrap{display:flex; flex-direction:column; align-items:center; text-align:center; padding:44px 28px 0; gap:14px}
.done-wrap img{width:150px; height:auto; filter:drop-shadow(0 14px 22px rgba(19,41,90,.2)); animation:bounce 2.4s infinite}
.done-wrap h2{font-family:var(--display); font-size:23px; font-weight:400; line-height:1.4}
.done-wrap p{font-size:13.5px; color:var(--muted); line-height:1.7}
.done-card{width:100%; margin-top:6px}
.done-card .card{display:flex; align-items:center; gap:12px}
/* ---------- AI 요약 ---------- */
.ai-tag{
  display:inline-flex; align-items:center; gap:6px; font-family:var(--display); font-size:12px;
  background:linear-gradient(135deg,#7DA8FF,#1E6BF2); color:#fff; padding:5px 12px; border-radius:999px;
}
.flow{display:flex; flex-direction:column; gap:0; margin-top:6px}
.flow .step{display:flex; gap:12px}
.flow .rail{display:flex; flex-direction:column; align-items:center; width:20px; flex:none}
.flow .dot{width:11px;height:11px;border-radius:50%;background:var(--red); border:2.5px solid #fff; box-shadow:0 0 0 2px var(--red); margin-top:5px}
.flow .bar{flex:1; width:0; border-left:2px dashed #F0B5B0; margin:4px 0}
.flow .body{padding-bottom:18px}
.flow .inning{font-family:var(--display); font-size:13px; color:var(--red)}
.flow p{font-size:13.5px; line-height:1.65; margin-top:3px}
.quote{
  margin-top:14px; background:linear-gradient(135deg,#FFF6F5,#FFECEA); border-radius:var(--r-md);
  padding:14px 16px; font-size:13.5px; line-height:1.7; border:1.5px dashed #F2B7B2;
}
.quote b{font-family:var(--display); color:var(--red); font-weight:400}
.ai-chat{display:flex; align-items:flex-start; gap:10px; margin-top:18px}
.ai-chat img{width:50px; height:auto; flex:none; filter:drop-shadow(0 4px 8px rgba(19,41,90,.18)); position:sticky; top:70px}
.ai-chat .bubbles{display:flex; flex-direction:column; gap:10px; flex:1; min-width:0}
.ai-chat .balloon{
  background:#fff; border-radius:4px 18px 18px 18px; padding:13px 15px; box-shadow:var(--shadow);
  font-size:13.5px; line-height:1.75;
}
/* ---------- record ---------- */
.q-block{margin-bottom:16px}
.q-block label{display:flex; gap:8px; align-items:baseline; font-weight:700; font-size:14px; line-height:1.5; margin-bottom:8px}
.q-block label .num{font-family:var(--display); color:var(--red); flex:none}
.q-block textarea{
  width:100%; min-height:84px; border:1.5px solid var(--line); border-radius:var(--r-md); padding:12px 14px;
  font-family:var(--body); font-size:14px; line-height:1.6; color:var(--navy); resize:vertical; background:#fff; outline:none;
}
.q-block textarea:focus{border-color:var(--blue-400); box-shadow:0 0 0 3px rgba(61,135,255,.15)}
.answer-card{margin-bottom:12px}
.answer-card .q{display:flex; gap:8px; font-weight:700; font-size:13.5px; line-height:1.5}
.answer-card .q .num{font-family:var(--display); color:var(--red); flex:none}
.answer-card .a{margin-top:8px; font-size:14px; line-height:1.7; background:var(--sky); border-radius:var(--r-sm); padding:11px 13px}
/* ---------- my ---------- */
.profile{margin:4px 20px 0; display:flex; align-items:center; gap:14px}
.profile img{width:74px;height:auto; filter:drop-shadow(0 8px 14px rgba(19,41,90,.2))}
.profile h2{font-family:var(--display); font-size:20px; font-weight:400}
.profile p{font-size:12.5px; color:var(--muted); margin-top:3px}
.stat-row{display:flex; gap:10px; padding:16px 20px 0}
.stat{flex:1; background:#fff; border-radius:var(--r-md); box-shadow:var(--shadow); padding:14px 8px; text-align:center}
.stat b{font-family:var(--display); font-size:21px; font-weight:400; color:var(--blue-600)}
.stat span{display:block; font-size:11px; color:var(--muted); margin-top:3px; font-weight:500}
.menu{margin:14px 20px 0; background:#fff; border-radius:var(--r-lg); box-shadow:var(--shadow); overflow:hidden}
.menu button{
  width:100%; display:flex; align-items:center; gap:12px; padding:16px 18px; border:none; background:none;
  cursor:pointer; font-size:14.5px; font-weight:700; color:var(--navy); border-bottom:1.5px solid var(--sky);
}
.menu button:last-child{border-bottom:none}
.menu button .ic{width:34px;height:34px;border-radius:11px;background:var(--sky); display:flex;align-items:center;justify-content:center; color:var(--blue-600); flex:none}
.menu button .spacer{flex:1}
.thanks-panel{max-height:0; overflow:hidden; transition:max-height .3s ease; background:var(--sky); border-bottom:1.5px solid var(--sky)}
.thanks-panel.open{border-bottom:1.5px solid #fff}
.thanks-intro{padding:14px 18px 6px; font-size:12.5px; line-height:1.6; color:var(--muted)}
.thanks-item{display:flex; align-items:center; gap:12px; padding:11px 18px; text-decoration:none; color:var(--navy)}
.thanks-item:active{background:#E3EBFA}
.thanks-item .ava{width:38px; height:38px; border-radius:50%; flex:none; display:flex; align-items:center; justify-content:center; font-family:var(--display); font-size:14px; color:#fff; background:linear-gradient(135deg,var(--blue-400),var(--blue-600))}
.thanks-item .meta{flex:1; min-width:0}
.thanks-item .meta b{font-size:14px; font-weight:700}
.thanks-item .meta span{display:block; font-size:11.5px; color:var(--muted); margin-top:1px}
.thanks-item .ig{width:26px; height:26px; flex:none; color:#C3CFE6}
/* toast */
#toast{
  position:absolute; left:50%; bottom:104px; transform:translateX(-50%) translateY(20px); z-index:90;
  background:rgba(19,41,90,.92); color:#fff; padding:11px 20px; border-radius:999px; font-size:13px; font-weight:500;
  opacity:0; pointer-events:none; transition:all .25s; white-space:nowrap;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <!-- 로그인 -->
  <section class="screen" id="scr-login">
    <span class="confetti" style="top:9%;  left:16%; background:#F2DD55; transform:rotate(-30deg)"></span>
    <span class="confetti" style="top:14%; left:74%; background:#7FA9F5; transform:rotate(24deg)"></span>
    <span class="confetti" style="top:33%; left:24%; background:#6ECBA8; transform:rotate(40deg)"></span>
    <span class="confetti" style="top:40%; left:82%; background:#F09A93; transform:rotate(-18deg)"></span>
    <span class="confetti" style="top:64%; left:13%; background:#7FA9F5; transform:rotate(-38deg)"></span>

const aiTeaser = g => {
  if(!g.summary) return '';
  const paras = g.summary.trim().split(/\n+/);
  return paras[1] || paras[0] || '';
};
const QUESTIONS = [
  '오늘 경기에서 가장 기억에 남는 장면은?',
  '오늘 우리 팀에서 가장 인상 깊었던 선수나 순간은?',
  '오늘 경기를 한 문장으로 남긴다면?',
];
const DAY_LABEL = {yesterday:'어제', today:'오늘', tomorrow:'내일'};

const state = {
  myTeam:null,
  // gameId → {pick, result: 'hit'|'miss'|'void'|null(대기)}
  predictions:{ 6:{pick:'KT', result:'hit'}, 7:{pick:'LT', result:null} },
  // 과거 전적(목록 밖 누적치)

/* ================== 유틸 ================== */
const $ = s => document.querySelector(s);
const game = id => GAMES.find(g => g.id === Number(id));
const tdot = (code, sz) => `<span class="team-dot"${sz?` style="width:${sz}px;height:${sz}px"`:''}><img src="${TEAMS[code].logo}" alt="${TEAMS[code].short}"></span>`;
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove('show'), 2200);
}
function statusPill(g){
  const s = STATUS[g.status];
  const label = s.label;
  return `<span class="pill ${s.cls}">${label}</span>`;
}
function predResult(g){
  const p = state.predictions[g.id];
  if(!p) return null;
  if(p.result) return p.result;
  if(g.status==='canceled' || g.draw) return 'void';
  if(g.status==='end'){
    const winner = g.score[0]>g.score[1] ? g.home : g.away;
    return p.pick===winner ? 'hit' : 'miss';
  }
  return null; // 대기중
}
const RESULT_LABEL = {hit:'적중!', miss:'아쉽다…', void:'무효'};

/* ================== 라우터 ================== */
let current = 'onboard';
function go(name, param){
  const renders = {
    login:()=>{}, home:renderHome, games:renderGames, game:()=>renderGameDetail(param),
    predict:()=>renderPredict(param), predictDone:()=>renderPredictDone(param),
    ai:()=>renderAI(param), recordWrite:()=>renderRecordWrite(param),
    record:()=>renderRecord(param), records:renderRecords, mypred:renderMyPred,
    my:renderMy, onboard:renderOnboard,
  };
  (renders[name]||(()=>{}))();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const map = {login:'scr-login',home:'scr-home',games:'scr-games',game:'scr-game',predict:'scr-predict',predictDone:'scr-predict-done',ai:'scr-ai',recordWrite:'scr-record-write',record:'scr-record',records:'scr-records',mypred:'scr-mypred',my:'scr-my',onboard:'scr-onboard'};
  $('#'+map[name]).classList.add('active');
  $('#'+map[name]).scrollTop = 0;
  current = name;
  // GNB
  const tab = {home:'home',games:'games',game:'games',predict:'games',predictDone:'games',ai:'games',recordWrite:'games',record:'games',my:'my',records:'my',mypred:'my'}[name];
  $('#gnb').style.display = (name==='onboard'||name==='login') ? 'none':'flex';
  document.querySelectorAll('#gnb button').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
}

/* ================== 온보딩 ================== */
let onboardSel = null;
function renderOnboard(){
  const grid = $('#team-grid');
  grid.innerHTML = Object.keys(TEAMS).map(c=>`
    <div class="team-opt ${onboardSel===c?'sel':''}" onclick="pickTeam('${c}')">${tdot(c)}${TEAMS[c].name}</div>
  `).join('') + `<div class="team-opt none ${onboardSel==='none'?'sel':''}" onclick="pickTeam('none')">아직 정하지 않았어요</div>`;
  $('#onboard-go').disabled = !onboardSel;
}
function pickTeam(c){ onboardSel = c; renderOnboard(); }
$('#onboard-go').onclick = ()=>{
  state.myTeam = onboardSel==='none' ? null : onboardSel;
  toast(state.myTeam ? `${TEAMS[state.myTeam].name} 팬이시군요! 환영해요 ⚾` : '전체 경기 기준으로 보여드릴게요!');
  go('home');
};

/* ================== 홈 ================== */
function gameCard(g){
  const ended = g.status==='end';
  const mid = ended
    ? `<div class="score">${g.score[1]} : ${g.score[0]}</div><div class="sub">${g.draw?'무승부':'최종'}</div>`
    : g.status==='live'
      ? `<div class="vs">VS</div><div class="sub">경기 중</div>`
    : g.status==='canceled'
      ? `<div class="vs" style="font-size:20px">🚫</div><div class="sub">경기 취소</div>`
      : `<div class="vs">VS</div><div class="sub">${g.time} 예정</div>`;
  return `<div class="card game-card" onclick="go('game',${g.id})">
    <div class="top"><span>${DAY_LABEL[g.day]} ${g.time} · ${g.stadium}</span>${statusPill(g)}</div>
    <div class="teams">
      <div class="t">${tdot(g.away,44)}<span>${TEAMS[g.away].name}</span></div>
      <div class="mid">${mid}</div>
      <div class="t">${tdot(g.home,44)}<span>${TEAMS[g.home].name}</span></div>
    </div>
  </div>`;
}

/* ================== 경기 상세 ================== */
function renderGameDetail(id){
  const g = game(id); const p = state.predictions[g.id]; const res = predResult(g);
  const center = g.status==='end'
    ? `<div class="score">${g.score[1]}<span style="font-size:22px;opacity:.7"> : </span>${g.score[0]}</div>`
    : `<div class="vs">VS</div>`;
  let actions = '', notice = '';
  if(g.status==='scheduled'){
    actions = p
      ? `<button class="btn" disabled>이미 예측을 완료했어요</button>`
      : `<button class="btn red" onclick="go('predict',${g.id})">⚾ 승부 예측하기</button>`;
    if(p) notice = `<div class="notice blue">이 경기에서 <b>${TEAMS[p.pick].name}</b>의 승리를 예측하셨어요. 경기가 끝나면 결과를 알려드릴게요! (MVP에서는 예측 수정이 불가능해요)</div>`;
  }
  if(g.status==='live'){
    actions = `<button class="btn" disabled>예측 마감 — 경기가 진행 중이에요</button>`;
    notice = `<div class="notice blue">경기 결과는 종료 후에 반영돼요. 조금만 기다려 주세요!</div>` + notice;
    if(p) notice += `<div class="notice blue"><b>${TEAMS[p.pick].name}</b> 승리에 예측하셨어요. 경기가 끝날 때까지 함께 응원해요!</div>`;
  }
  if(g.status==='end'){
    actions = `
      ${p ? `<div class="card" style="display:flex;align-items:center;gap:12px">${tdot(p.pick)}<div class="info" style="flex:1"><b>내 예측: ${TEAMS[p.pick].name} 승</b><p style="font-size:12px;color:var(--muted);margin-top:2px">${g.draw?'무승부로 예측이 무효 처리됐어요':'예측 결과를 확인해 보세요'}</p></div><span class="pill ${res}">${RESULT_LABEL[res]||''}</span></div>`:''}
      <button class="btn" onclick="go('ai',${g.id})">🤖 AI 경기 요약 보기</button>
      ${state.records[g.id]
        ? `<button class="btn ghost" onclick="go('record',${g.id})">📓 내가 쓴 기록 보기</button>`
        : `<button class="btn ghost" onclick="go('recordWrite',${g.id})">✏️ 경기 기록 작성하기</button>`}`;
  }
  if(g.status==='canceled'){
    notice = `<div class="notice">경기가 취소됐어요. 이 경기에 한 승부 예측은 <b>무효</b> 처리됩니다.</div>`;
  }
  $('#scr-game').innerHTML = `
    <div class="appbar">
      <button class="back-btn" onclick="go('games')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <h1>경기 상세</h1>
    </div>
    <div class="detail-hero">
      <div class="bg"><div class="seam"></div>
        <div class="meta"><span>${DAY_LABEL[g.day]} ${g.time}</span>·<span>${g.stadium} 구장</span></div>
        <div class="teams">
          <div class="t">${tdot(g.away)}<span>${TEAMS[g.away].name}</span></div>
          ${center}
          <div class="t">${tdot(g.home)}<span>${TEAMS[g.home].name}</span></div>
        </div>
        <div class="statusline">${statusPill(g)}${g.draw?' <span class="pill" style="background:rgba(255,255,255,.2);color:#fff">무승부</span>':''}</div>
      </div>
      <div class="foot"><span>원정 ${TEAMS[g.away].short}</span><span>홈 ${TEAMS[g.home].short}</span></div>
    </div>
    ${notice}
    <div class="action-stack">${actions}</div>`;
}

/* ================== 승부 예측 ================== */
let pickSel = null;
function renderPredict(id){
  const g = game(id); pickSel = pickSel && (pickSel===g.home||pickSel===g.away) ? pickSel : null;
  $('#scr-predict').innerHTML = `
    <div class="appbar">
      <button class="back-btn" onclick="go('game',${g.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <h1>승부 예측하기</h1>
    </div>
    <div class="section" style="text-align:center; color:var(--muted); font-size:13px; line-height:1.7">
      ${DAY_LABEL[g.day]} ${g.time} · ${g.stadium} 구장<br><b style="color:var(--navy); font-size:15px">오늘 누가 이길까요?</b>
    </div>
    <div class="pick-wrap">
      <div class="pick ${pickSel===g.away?'sel':''}" onclick="pickSel='${g.away}';renderPredict(${g.id})">
        ${tdot(g.away)}<b>${TEAMS[g.away].name}</b><small>원정</small>
      </div>
      <div class="vs-badge">VS</div>
      <div class="pick ${pickSel===g.home?'sel':''}" onclick="pickSel='${g.home}';renderPredict(${g.id})">
        ${tdot(g.home)}<b>${TEAMS[g.home].name}</b><small>홈</small>
      </div>
    </div>
    <div class="notice blue" style="margin-top:20px">예측은 <b>경기 시작 전까지</b>만 가능하고, 제출 후에는 수정할 수 없어요. 경기가 취소되면 자동으로 무효 처리돼요.</div>
    <div class="action-stack">
      <button class="btn red" ${pickSel?'':'disabled'} onclick="submitPredict(${g.id})">예측 제출하기</button>
    </div>`;
}
function submitPredict(id){
  state.predictions[id] = {pick:pickSel, result:null};
  pickSel = null;
  go('predictDone', id);
}

/* ================== AI 요약 ================== */
function renderAI(id){
  const g = game(id);
  const mascot = $('#scr-login .login-body img').src;
  const paras = g.summary.trim().split(/\n+/);
  $('#scr-ai').innerHTML = `
    <div class="appbar">
      <button class="back-btn" onclick="go('game',${g.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <h1>AI 경기 요약</h1>
    </div>
    <div class="section">
      <div class="card">
        <span class="ai-tag">🤖 승구의 AI 요약</span>
        <div style="display:flex; align-items:center; justify-content:space-between; margin-top:14px">
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px">${tdot(g.away,42)}<b style="font-size:13px">${TEAMS[g.away].short}</b></div>
          <div style="text-align:center"><div style="font-family:var(--display); font-size:32px">${g.score[1]} : ${g.score[0]}</div><span class="pill end" style="margin-top:4px">${g.draw?'무승부':'경기 종료'}</span></div>
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px">${tdot(g.home,42)}<b style="font-size:13px">${TEAMS[g.home].short}</b></div>
        </div>
        <p style="text-align:center; font-size:12px; color:var(--muted); margin-top:10px">${DAY_LABEL[g.day]} ${g.time} · ${g.stadium} 구장</p>
      </div>
      <div class="ai-chat">
        <img src="${mascot}" alt="승구">
        <div class="bubbles">${paras.map(p=>`<div class="balloon">${p}</div>`).join('')}</div>
      </div>
    </div>
    <div class="action-stack">
      ${state.records[g.id]
        ? `<button class="btn ghost" onclick="go('record',${g.id})">📓 내가 쓴 기록 보기</button>`
        : `<button class="btn" onclick="go('recordWrite',${g.id})">✏️ 이 경기 기록 남기기</button>`}
    </div>`;
}

/* ================== 기록 작성 ================== */
function renderRecordWrite(id){
  const g = game(id); const ex = state.records[id];
  $('#scr-record-write').innerHTML = `
    <div class="appbar">
      <button class="back-btn" onclick="go('game',${g.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <h1>경기 기록 작성</h1>
    </div>
    <div class="section">
      <div class="card" style="display:flex; align-items:center; gap:12px">
        ${tdot(g.away)}${tdot(g.home)}
        <div class="info"><b style="font-size:14px">${TEAMS[g.away].short} ${g.score[1]} : ${g.score[0]} ${TEAMS[g.home].short}</b>
        <p style="font-size:12px; color:var(--muted); margin-top:2px">${aiTeaser(g)}</p></div>
      </div>
      <div class="stitch" style="margin:18px 0 14px"></div>
      ${QUESTIONS.map((q,i)=>`
        <div class="q-block">
          <label><span class="num">Q${i+1}.</span>${q}</label>
          <textarea id="ans-${i}" placeholder="자유롭게 적어주세요">${ex?ex.answers[i]:''}</textarea>
        </div>`).join('')}
    </div>
    <div class="action-stack">
      <button class="btn" onclick="saveRecord(${g.id})">기록 저장하기</button>
    </div>`;
}
function saveRecord(id){
  const answers = [0,1,2].map(i=>$('#ans-'+i).value.trim());
  if(answers.every(a=>!a)){ toast('한 가지 질문에라도 답을 남겨주세요!'); return; }
  state.records[id] = {answers, date:'오늘'};
  toast('기록이 저장됐어요! 📓');
  go('record', id);
}

/* ================== 기록 상세 ================== */
function renderRecord(id){
  const g = game(id); const r = state.records[id];
  $('#scr-record').innerHTML = `
    <div class="appbar">
      <button class="back-btn" onclick="go('records')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <h1>기록 상세</h1><div class="spacer"></div>
      <button class="back-btn" style="width:auto; padding:0 14px; border-radius:999px; font-family:var(--display); font-size:12px" onclick="go('recordWrite',${g.id})">수정</button>
    </div>
    <div class="section">
      <div class="card" style="display:flex; align-items:center; gap:12px">
        ${tdot(g.away)}${tdot(g.home)}
        <div class="info"><b style="font-size:14px">${TEAMS[g.away].short} ${g.score[1]} : ${g.score[0]} ${TEAMS[g.home].short}</b>
        <p style="font-size:12px; color:var(--muted); margin-top:2px">${r.date} 작성 · ${g.stadium} 구장</p></div>
      </div>
      <div class="section-title" style="margin-top:20px">AI 경기 요약</div>
      <div class="quote"><b>승구의 한 줄 요약 ⚾</b><br>${aiTeaser(g)}</div>
      <div class="section-title" style="margin-top:22px">나의 기록</div>
      ${r.answers.map((a,i)=>`
        <div class="card answer-card">
          <div class="q"><span class="num">Q${i+1}.</span>${QUESTIONS[i]}</div>
          <div class="a">${a||'<span style="color:var(--muted)">답변을 남기지 않았어요</span>'}</div>
        </div>`).join('')}
    </div>
    <div class="action-stack">
      <button class="btn ghost" onclick="go('ai',${g.id})">🤖 AI 경기 요약 보기</button>
    </div>`;
}

/* ================== 기록 목록 ================== */
function renderRecords(){
  const ids = Object.keys(state.records);
  $('#records-list').innerHTML = ids.length ? ids.map(id=>{
    const g = game(id); const r = state.records[id];
    return `<div class="card" onclick="go('record',${id})">
      ${tdot(g.away)}${tdot(g.home)}

      <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>

/* ================== 내 예측 기록 ================== */
function renderMyPred(){
  const ids = Object.keys(state.predictions);
  $('#mypred-list').innerHTML = ids.length ? ids.map(id=>{
    const g = game(id); const p = state.predictions[id]; const res = predResult(g);
    return `<div class="card" onclick="go('game',${id})">
      ${tdot(p.pick)}
      <div class="info"><b>${TEAMS[g.away].short} vs ${TEAMS[g.home].short}</b><p>내 픽: ${TEAMS[p.pick].name} · ${DAY_LABEL[g.day]} ${g.time}</p></div>
      <span class="pill ${res||''}">${res?RESULT_LABEL[res]:'대기중'}</span>
    </div>`;
  }).join('')

/* ================== 마이 ================== */
function renderMy(){
  thanksOpen = false;
  const tp = $('#thanks-panel'); if(tp){ tp.style.maxHeight='0px'; tp.classList.remove('open'); }
  const tc = $('#thanks-chev'); if(tc){ tc.style.transform='rotate(0deg)'; }
  $('#my-team-label').textContent = state.myTeam ? `응원 구단 · ${TEAMS[state.myTeam].name}` : '응원 구단 미설정 · 전체 경기 기준';
  let hit = state.pastRecord.hit, miss = state.pastRecord.miss, voidN = state.pastRecord.void;
  Object.keys(state.predictions).forEach(id=>{
    const r = predResult(game(id));
    if(r==='hit') hit++; else if(r==='miss') miss++; else if(r==='void') voidN++;
  });
  const total = hit+miss;
  const rate = total ? Math.round(hit/total*100) : 0;
  $('#my-stats').innerHTML = `
    <div class="stat"><b>${rate}%</b><span>적중률</span></div>
    <div class="stat"><b>${Object.keys(state.records).length}개</b><span>내 기록</span></div>`;
}

/* ================== Thanks to ================== */
const THANKS = [
  {name:'독수리일지', handle:'eagles_diary',  desc:'한화 이글스', team:'HH'},
  {name:'누리수',     handle:'giants_nurisu', desc:'롯데 자이언츠', team:'LT'},
  {name:'김쥬',       handle:'kim.juuu',      desc:'롯데 자이언츠', team:'LT'},
];
let thanksOpen = false;
function renderThanks(){
  const panel = $('#thanks-panel');
  panel.innerHTML = `
    <div class="thanks-intro">서비스에 소중한 의견을 주신 분들이에요. 감사합니다 💙</div>
    ${THANKS.map(t=>`
      <a class="thanks-item" href="https://instagram.com/${t.handle}" target="_blank" rel="noopener noreferrer">
        <span class="ava" style="background:${TEAMS[t.team].color}">${t.name[0]}</span>
        <span class="meta"><b>${t.name}</b><span>@${t.handle} · ${t.desc}</span></span>
        <svg class="ig" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      </a>`).join('')}`;
}
function toggleThanks(){
  thanksOpen = !thanksOpen;
  const panel = $('#thanks-panel'), chev = $('#thanks-chev');
  if(thanksOpen){
    renderThanks();
    panel.classList.add('open');
    panel.style.maxHeight = panel.scrollHeight + 'px';
    chev.style.transform = 'rotate(90deg)';
    setTimeout(()=>{
      $('#thanks-toggle').scrollIntoView({behavior:'smooth', block:'start'});
    }, 320);
  } else {
    panel.style.maxHeight = '0px';
    panel.classList.remove('open');
    chev.style.transform = 'rotate(0deg)';
  }
}
